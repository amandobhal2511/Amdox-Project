<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — AI Cloud ERP Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="orders" data-page-title="Orders" class="flex min-h-screen">

  <!-- Sidebar Overlay (mobile) -->
  <div id="sidebar-overlay" class="sidebar-overlay lg:hidden"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar fixed lg:static flex flex-col">
    <div class="p-5 border-b border-slate-700/50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <div>
          <h2 class="font-bold text-sm gradient-text">AI Cloud ERP</h2>
          <p class="text-xs text-slate-500">Enterprise Suite</p>
        </div>
      </div>
    </div>
    <nav class="flex-1 py-4 overflow-y-auto">
      <a href="dashboard.html" class="sidebar-link" data-page="dashboard">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        Dashboard
      </a>
      <a id="employees-link" href="employees.html" class="sidebar-link" data-page="employees">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        Employees
      </a>
      <a href="inventory.html" class="sidebar-link" data-page="inventory">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        Inventory
      </a>
      <a id="finance-link" href="finance.html" class="sidebar-link" data-page="finance">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Finance
      </a>
      <a id="orders-link" href="orders.html" class="sidebar-link" data-page="orders">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Orders
      </a>
      <a href="notifications.html" class="sidebar-link" data-page="notifications">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        Notifications
      </a>
      <a href="settings.html" class="sidebar-link" data-page="settings">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Settings
      </a>
    </nav>
    <div class="p-4 border-t border-slate-700/50">
      <a href="#" id="logout-btn" class="sidebar-link text-red-400 hover:text-red-300 hover:bg-red-500/10">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Logout
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Top Navbar -->
    <header class="sticky top-0 z-30 bg-slate-900/80 backdrop-blur-xl border-b border-slate-700/50 px-4 lg:px-6 py-3">
      <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <button id="sidebar-toggle" class="lg:hidden p-2 rounded-lg hover:bg-slate-800 transition-colors">
            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <h1 id="page-title" class="text-lg font-semibold text-white">Orders</h1>
        </div>
        <div class="flex items-center gap-3">
          <div class="hidden md:block relative">
            <input type="text" placeholder="Search..." class="form-input !py-2 !pl-9 !pr-4 w-64 text-sm">
            <svg class="w-4 h-4 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </div>
          <a href="notifications.html" class="relative p-2 rounded-lg hover:bg-slate-800 transition-colors">
            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <span id="notif-badge" class="absolute -top-0.5 -right-0.5 w-5 h-5 bg-indigo-500 text-white text-xs rounded-full items-center justify-center font-medium" style="display:none;">0</span>
          </a>
          <div class="flex items-center gap-2 pl-2 border-l border-slate-700">
            <div id="nav-avatar" class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-xs font-bold text-white">U</div>
            <span id="nav-username" class="hidden sm:block text-sm font-medium text-slate-300">User</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 p-4 lg:p-6 overflow-y-auto">
      <!-- Stats Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-6">
        <div class="stat-card glass-card p-5 animate-fade-in">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-slate-400">Total Orders</p>
              <p id="ord-total" class="text-2xl font-bold text-white mt-1">0</p>
            </div>
            <div class="stat-icon bg-blue-500/20 text-blue-400">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            </div>
          </div>
        </div>
        <div class="stat-card glass-card p-5 animate-fade-in" style="animation-delay:0.1s">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-slate-400">Pending</p>
              <p id="ord-pending" class="text-2xl font-bold text-white mt-1">0</p>
            </div>
            <div class="stat-icon bg-amber-500/20 text-amber-400">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
          </div>
        </div>
        <div class="stat-card glass-card p-5 animate-fade-in" style="animation-delay:0.2s">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-slate-400">Processing</p>
              <p id="ord-processing" class="text-2xl font-bold text-white mt-1">0</p>
            </div>
            <div class="stat-icon bg-indigo-500/20 text-indigo-400">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </div>
          </div>
        </div>
        <div class="stat-card glass-card p-5 animate-fade-in" style="animation-delay:0.3s">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-slate-400">Total Revenue</p>
              <p id="ord-revenue" class="text-2xl font-bold text-white mt-1">$0</p>
            </div>
            <div class="stat-icon bg-green-500/20 text-green-400">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
          </div>
        </div>
      </div>

      <!-- Toolbar & Table -->
      <div class="glass-card p-5">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-5">
          <h3 class="text-sm font-semibold text-slate-200">Order Management</h3>
          <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
            <div class="relative">
              <input type="text" id="ord-search" placeholder="Search orders..." class="form-input !py-2 !pl-9 !pr-4 w-full sm:w-56 text-sm">
              <svg class="w-4 h-4 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
            <select id="status-filter" class="form-input !py-2 text-sm w-full sm:w-40">
              <option value="">All</option>
              <option value="Pending">Pending</option>
              <option value="Processing">Processing</option>
              <option value="Delivered">Delivered</option>
            </select>
            <button id="add-order-btn" class="btn-gradient text-sm whitespace-nowrap">+ Add Order</button>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="orders-table-body">
              <tr><td colspan="7" class="text-center py-8 text-slate-500">Loading orders...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Order Modal -->
  <div id="order-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-lg font-semibold text-white">Add Order</h3>
        <button type="button" data-close-modal="order-modal" class="p-1 rounded-lg hover:bg-slate-700/50 text-slate-400 hover:text-white transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="space-y-4">
        <div>
          <label for="ord-customer" class="form-label">Customer Name</label>
          <input type="text" id="ord-customer" class="form-input" placeholder="TechCorp Inc.">
        </div>
        <div>
          <label for="ord-product" class="form-label">Product</label>
          <input type="text" id="ord-product" class="form-input" placeholder="Wireless Mouse">
        </div>
        <div>
          <label for="ord-quantity" class="form-label">Quantity</label>
          <input type="number" id="ord-quantity" class="form-input" placeholder="10" min="1">
        </div>
        <div>
          <label for="ord-price" class="form-label">Total Price ($)</label>
          <input type="number" id="ord-price" class="form-input" placeholder="299.90" min="0" step="0.01">
        </div>
        <div>
          <label for="ord-status" class="form-label">Status</label>
          <select id="ord-status" class="form-input">
            <option value="Pending">Pending</option>
            <option value="Processing">Processing</option>
            <option value="Delivered">Delivered</option>
          </select>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button type="button" data-close-modal="order-modal" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-700/50 transition-colors">Cancel</button>
        <button type="button" id="save-order-btn" class="btn-gradient text-sm">Save Order</button>
      </div>
    </div>
  </div>

  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>
